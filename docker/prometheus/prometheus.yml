global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:9363']
    metrics_path: /metrics # 抓取 ClickHouse 内置的 Prometheus 指标。

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
