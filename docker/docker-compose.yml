services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: lp-clickhouse
    ports:
      - "8123:8123" # ClickHouse HTTP 端口，.NET 驱动通过它访问。
      - "9004:9004" # ClickHouse MySQL 兼容端口，HeidiSQL 等工具通过它访问。
    environment:
      CLICKHOUSE_DB: lp_observability
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: 123456
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./config.d/prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user admin --password 123456 --query 'SELECT 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - clickhouse-net

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: clickhouse-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - clickhouse-net

  grafana:
    image: grafana/grafana:10.1.0
    container_name: clickhouse-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=123456
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - clickhouse-net

volumes:
  clickhouse-data:
  prometheus-data:
  grafana-data:

networks:
  clickhouse-net:
    driver: bridge



